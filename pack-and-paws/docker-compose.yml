services:
  postgres:
    image: postgres:16-alpine
    container_name: pack-and-paws-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: packpaws
      POSTGRES_PASSWORD: packpaws_dev
      POSTGRES_DB: pack_and_paws
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packpaws -d pack_and_paws"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
